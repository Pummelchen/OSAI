name: XAIOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile-check:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Compile-check kernel C files
        run: |
          FAILED=0
          for f in $(find kernel -name '*.c'); do
            clang --target=aarch64-none-elf -std=c99 -ffreestanding \
              -fno-stack-protector -fno-builtin -fno-pic -fno-pie \
              -Wall -Wextra -Werror \
              -Ikernel/include -fsyntax-only "$f" || FAILED=$((FAILED + 1))
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::$FAILED kernel file(s) failed compilation"
            exit 1
          fi
          echo "All kernel C files compiled clean"

      - name: Compile-check userspace C files
        run: |
          FAILED=0
          for f in $(find userspace -name '*.c'); do
            clang --target=aarch64-none-elf -std=c99 -ffreestanding \
              -fno-stack-protector -fno-builtin -fno-pic -fno-pie \
              -Wall -Wextra -Werror \
              -Iuserspace/include -fsyntax-only "$f" || FAILED=$((FAILED + 1))
          done
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::$FAILED userspace file(s) failed compilation"
            exit 1
          fi
          echo "All userspace C files compiled clean"

  abi-contract:
    name: ABI Contract Validation
    runs-on: ubuntu-latest
    needs: compile-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3
        run: |
          sudo apt-get update
          sudo apt-get install -y python3

      - name: Validate ABI contract
        run: python3 scripts/qemu-abi-contract.py

  build-and-smoke:
    name: Build & QEMU Smoke Test
    runs-on: ubuntu-latest
    needs: compile-check
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld qemu-system-arm qemu-efi-aarch64 mtools python3

      - name: Build disk image
        run: make image

      - name: QEMU smoke test
        run: python3 scripts/qemu-smoke.py
        env:
          XAIOS_QEMU_SMOKE_TIMEOUT: "120"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/*.img
            build/kernel/kernel.elf
            build/uefi/BOOTAA64.EFI
          retention-days: 7

  regression:
    name: Regression Suite
    runs-on: ubuntu-latest
    needs: build-and-smoke
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld qemu-system-arm qemu-efi-aarch64 mtools python3

      - name: Build disk image
        run: make image

      - name: Run regression suite
        run: python3 scripts/qemu-regression-suite.py
        env:
          XAIOS_QEMU_SMOKE_TIMEOUT: "120"
